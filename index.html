<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vibe Coding Collective</title>
    <meta
      name="description"
      content="Join thousands of new creators building with GenAI in pubs, studios, and community spaces around the globe!"
    />

    <!--
      Icons. Generated from public/assets/nav-sticky/logo-nav.svg — that SVG is 326kB
      (21 detailed lettering paths), so it is NOT served as a favicon; these rasters are.
      apple-touch-icon is flattened onto brand blue because iOS composites transparency
      on black before applying its own squircle mask.
    -->
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" href="/favicon-192.png" type="image/png" sizes="192x192" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#fde9c9" />

    <!--
      Canonical + social. Absolute URLs are REQUIRED here: scrapers do not resolve
      relative og:image paths. They must point at WWW, the primary domain — not the
      apex, which 308-redirects to www. A redirecting og:image is a known cause of
      share cards rendering with no image, because several scrapers refuse to follow
      one. If the primary ever moves back to the apex, these four URLs move with it.
    -->
    <link rel="canonical" href="https://www.vibecoders.global/" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Vibe Coding Collective" />
    <meta property="og:url" content="https://www.vibecoders.global/" />
    <meta property="og:title" content="Vibe Coding Collective" />
    <meta
      property="og:description"
      content="Join thousands of new creators building with GenAI in pubs, studios, and community spaces around the globe!"
    />
    <meta property="og:image" content="https://www.vibecoders.global/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="The Vibe Coding Collective logo above the headline '4,000+ members are already here'."
    />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Vibe Coding Collective" />
    <meta
      name="twitter:description"
      content="Join thousands of new creators building with GenAI in pubs, studios, and community spaces around the globe!"
    />
    <meta name="twitter:image" content="https://www.vibecoders.global/og-image.png" />
  </head>
