<!-- Section 03 — Stats + "supported BY". Root <section>. Owner: builder(03-stats). -->
<section class="s-stats" id="stats">
  <!-- Stats cluster (entrance-reveal block 1) -->
  <div class="s-stats__cluster" data-reveal>
    <div class="container container--900 s-stats__intro">
      <h2 class="s-stats__headline">
        <span class="t-hero s-stats__count">4,000+ </span>
        <span class="t-band-title s-stats__lead">members are ALREADY HERE</span>
      </h2>
      <p class="t-body-lg s-stats__desc">From photographers to chefs to accountants. Seven countries. One mission: prove that anyone can build.</p>
    </div>

    <div class="s-stats__figures">
      <div class="s-stats__figure">
        <p class="t-stat s-stats__num">9</p>
        <div class="s-stats__figure-labels">
          <p class="t-card-title s-stats__figure-label">Countries</p>
          <p class="t-card-title s-stats__flags" aria-hidden="true">🇬🇧🇩🇪🇺🇸🇯🇵🇺🇦🇵🇹🇳🇱🇵🇰</p>
        </div>
      </div>
      <div class="s-stats__figure">
        <p class="t-stat s-stats__num">100%</p>
        <p class="t-card-title s-stats__figure-label">Word of mouth</p>
      </div>
    </div>
  </div>

  <!-- "supported BY" sponsor marquee (entrance-reveal block 2) -->
  <div class="s-stats__supported" data-reveal>
    <h3 class="t-card-title s-stats__supported-title">supported BY</h3>

    <!--
      Pure-CSS marquee (see 40-interactions.md §5): a single track holding TWO
      identical sponsor groups; translateX(-50%) over one loop makes the second
      group land exactly where the first began → seamless. Each group carries a
      trailing gap so the seam spacing matches the internal spacing. A
      prefers-reduced-motion fallback (in 03-stats.css) stops the animation and
      shows one static, wrapped group. Each pill holds the sponsor's REAL logo
      (recovered per docs/spec/31-recovered-assets.md Group 2; the brand→hash
      mapping was visually confirmed by the orchestrator). The VISIBLE track's
      <img> carries the brand name as its alt (the accessible name); the
      aria-hidden duplicate uses alt="" so each logo is announced exactly once.
      Display height is normalized in CSS (the intrinsic scans are 120–240px
      tall) so the row reads evenly.
    -->
    <div class="s-stats__marquee">
      <div class="s-stats__marquee-track">
        <ul class="s-stats__sponsors" role="list">
          <li class="s-stats__sponsor"><img class="s-stats__sponsor-logo" src="/assets/stats/logo-ok-tech.png" alt="OK Tech" width="404" height="160" loading="eager" decoding="async" /></li>
          <li class="s-stats__sponsor"><img class="s-stats__sponsor-logo" src="/assets/stats/logo-macpaw.png" alt="MacPaw" width="600" height="240" loading="eager" decoding="async" /></li>
          <li class="s-stats__sponsor"><img class="s-stats__sponsor-logo" src="/assets/stats/logo-microsoft.png" alt="Microsoft" width="402" height="160" loading="eager" decoding="async" /></li>
          <li class="s-stats__sponsor"><img class="s-stats__sponsor-logo" src="/assets/stats/logo-elevenlabs.png" alt="ElevenLabs" width="498" height="160" loading="eager" decoding="async" /></li>
          <li class="s-stats__sponsor"><img class="s-stats__sponsor-logo" src="/assets/stats/logo-softr.png" alt="Softr" width="366" height="160" loading="eager" decoding="async" /></li>
          <li class="s-stats__sponsor"><img class="s-stats__sponsor-logo" src="/assets/stats/logo-valae.png" alt="Valae" width="256" height="120" loading="eager" decoding="async" /></li>
          <li class="s-stats__sponsor"><img class="s-stats__sponsor-logo" src="/assets/stats/logo-lovable.png" alt="Lovable" width="400" height="160" loading="eager" decoding="async" /></li>
        </ul>
        <ul class="s-stats__sponsors" aria-hidden="true">
          <li class="s-stats__sponsor"><img class="s-stats__sponsor-logo" src="/assets/stats/logo-ok-tech.png" alt="" width="404" height="160" loading="eager" decoding="async" /></li>
          <li class="s-stats__sponsor"><img class="s-stats__sponsor-logo" src="/assets/stats/logo-macpaw.png" alt="" width="600" height="240" loading="eager" decoding="async" /></li>
          <li class="s-stats__sponsor"><img class="s-stats__sponsor-logo" src="/assets/stats/logo-microsoft.png" alt="" width="402" height="160" loading="eager" decoding="async" /></li>
          <li class="s-stats__sponsor"><img class="s-stats__sponsor-logo" src="/assets/stats/logo-elevenlabs.png" alt="" width="498" height="160" loading="eager" decoding="async" /></li>
          <li class="s-stats__sponsor"><img class="s-stats__sponsor-logo" src="/assets/stats/logo-softr.png" alt="" width="366" height="160" loading="eager" decoding="async" /></li>
          <li class="s-stats__sponsor"><img class="s-stats__sponsor-logo" src="/assets/stats/logo-valae.png" alt="" width="256" height="120" loading="eager" decoding="async" /></li>
          <li class="s-stats__sponsor"><img class="s-stats__sponsor-logo" src="/assets/stats/logo-lovable.png" alt="" width="400" height="160" loading="eager" decoding="async" /></li>
        </ul>
      </div>
    </div>
  </div>
</section>
